<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Calendar</title>
    <style>
        :root {
            --donal: #3B82F6;
            --nicola: #EC4899;
            --aoife: #10B981;
            --family: #F59E0B;
            --bg: #0B1120;
            --surface: #161F35;
            --elevated: #1E2D48;
            --elevated2: #253555;
            --border: rgba(255,255,255,0.09);
            --border2: rgba(255,255,255,0.15);
            --text: #F0F4FF;
            --muted: #8899BB;
            --radius-lg: 18px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --hdr-grad: linear-gradient(145deg,#110e2e 0%,#1e1254 50%,#0f0e2a 100%);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: system-ui,-apple-system,'Segoe UI',sans-serif;
            background: var(--bg); color: var(--text);
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
            font-size: 15px;
        }

        /* ── SCREENS ─────────────────────────────────────── */
        .screen {
            position: fixed; inset: 0; z-index: 500;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(145deg,#060c18 0%,#13103a 50%,#060c18 100%);
        }
        .screen.hidden { display: none; }
        .auth-box {
            background: var(--surface);
            border: 1px solid rgba(139,92,246,.3);
            border-radius: 28px; padding: 52px 44px; width: min(460px,94vw);
            box-shadow: 0 0 100px rgba(99,102,241,.15), 0 30px 80px rgba(0,0,0,.6);
        }
        .auth-hero { text-align: center; margin-bottom: 36px; }
        .auth-hero .icon { font-size: 68px; display: block; margin-bottom: 14px; }
        .auth-hero h1 {
            font-size: 30px; font-weight: 900;
            background: linear-gradient(135deg,#818CF8,#C084FC,#F472B6);
            -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
        }
        .auth-hero p { color: var(--muted); font-size: 15px; margin-top: 8px; }
        .btn-main {
            width: 100%; padding: 17px; background: linear-gradient(135deg,#5B5EE8,#7C3AED);
            border: none; border-radius: var(--radius-md); color: #fff; font-size: 17px; font-weight: 800;
            cursor: pointer; margin-top: 8px; transition: transform .1s, box-shadow .2s;
            letter-spacing: .02em;
        }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(99,102,241,.45); }
        .btn-main:active { transform: translateY(0); }
        .auth-err { color: #F87171; font-size: 14px; text-align: center; margin-top: 12px; min-height: 20px; }

        /* ── FIELDS (shared) ─────────────────────────────── */
        .field { margin-bottom: 16px; }
        .field label {
            display: block; font-size: 11px; font-weight: 800;
            text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 8px;
        }
        .field input, .field select, .field textarea {
            width: 100%; padding: 14px 16px; background: var(--elevated);
            border: 2px solid var(--border); border-radius: var(--radius-sm); color: var(--text);
            font-size: 16px; outline: none; transition: border-color .2s, background .2s; font-family: inherit;
        }
        .field input:focus, .field select:focus, .field textarea:focus {
            border-color: #6366F1; background: var(--elevated2);
        }
        .field textarea { resize: vertical; min-height: 84px; }
        .field select { cursor: pointer; }
        .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .chk-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; }
        .chk-row input[type=checkbox] { width: 20px; height: 20px; accent-color: #6366F1; cursor: pointer; flex-shrink: 0; }
        .chk-row label { font-size: 15px; font-weight: 600; color: var(--text); cursor: pointer; }

        /* ── HEADER ──────────────────────────────────────── */
        #hdr {
            background: var(--hdr-grad);
            border-bottom: 1px solid rgba(139,92,246,.25);
            padding: 0 20px; flex-shrink: 0;
        }
        .hdr-top {
            display: flex; align-items: center; gap: 14px;
            padding: 14px 0 10px; flex-wrap: wrap;
        }
        .fam-title {
            font-size: 22px; font-weight: 900; white-space: nowrap;
            background: linear-gradient(135deg,#a5b4fc,#c084fc);
            -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
        }
        .nav-row { display: flex; align-items: center; gap: 8px; }
        .nav-btn {
            width: 46px; height: 46px; border: none; border-radius: 50%;
            background: rgba(255,255,255,.1); color: #fff; font-size: 26px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background .15s, transform .1s; line-height: 1; flex-shrink: 0;
        }
        .nav-btn:hover { background: rgba(255,255,255,.2); transform: scale(1.08); }
        .nav-btn:active { transform: scale(.96); }
        .today-btn {
            padding: 10px 18px; border: 2px solid rgba(255,255,255,.22); border-radius: 24px;
            background: transparent; color: #fff; font-size: 14px; font-weight: 700;
            cursor: pointer; transition: background .15s, border-color .15s; white-space: nowrap;
        }
        .today-btn:hover { background: rgba(255,255,255,.1); border-color: rgba(255,255,255,.4); }
        .period-lbl {
            font-size: 20px; font-weight: 900; color: #fff;
            min-width: 200px; text-align: center; letter-spacing: -.01em;
        }
        .spacer { flex: 1; min-width: 16px; }
        .btn-add {
            padding: 12px 22px; background: linear-gradient(135deg,#5B5EE8,#8B5CF6);
            border: none; border-radius: 24px; color: #fff; font-size: 15px; font-weight: 800;
            cursor: pointer; white-space: nowrap; transition: transform .12s, box-shadow .2s;
            box-shadow: 0 4px 20px rgba(99,102,241,.35); letter-spacing: .01em;
        }
        .btn-add:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(99,102,241,.5); }
        .btn-add:active { transform: translateY(0); }
        .btn-logout {
            padding: 10px 16px; background: rgba(255,255,255,.06);
            border: 1px solid rgba(255,255,255,.12); border-radius: 24px;
            color: var(--muted); font-size: 14px; font-weight: 600; cursor: pointer;
            transition: background .15s; white-space: nowrap;
        }
        .btn-logout:hover { background: rgba(255,255,255,.14); color: var(--text); }

        /* Header bottom row */
        .hdr-bottom {
            display: flex; gap: 12px; padding: 0 0 14px; flex-wrap: wrap; align-items: center;
        }
        .tog-grp {
            display: flex; background: rgba(0,0,0,.4);
            border-radius: 14px; padding: 4px; gap: 3px;
        }
        .view-btn {
            padding: 9px 18px; border: none; border-radius: 11px; background: transparent;
            color: var(--muted); font-size: 14px; font-weight: 700; cursor: pointer;
            transition: all .2s; letter-spacing: .01em;
        }
        .view-btn.active {
            background: linear-gradient(135deg,#5B5EE8,#7C3AED);
            color: #fff;
            box-shadow: 0 3px 12px rgba(99,102,241,.4);
        }
        .view-btn:not(.active):hover { background: rgba(255,255,255,.08); color: var(--text); }

        /* Member pills – bigger, bolder */
        .mem-pill {
            display: inline-flex; align-items: center; gap: 7px;
            padding: 9px 18px; border: 2px solid; border-radius: 24px; background: transparent;
            font-size: 14px; font-weight: 800; cursor: pointer; transition: all .2s;
            text-transform: uppercase; letter-spacing: .04em; opacity: .52;
        }
        .mem-pill .mem-dot {
            width: 9px; height: 9px; border-radius: 50%; background: currentColor;
            flex-shrink: 0; transition: transform .2s;
        }
        .mem-pill.on { opacity: 1; color: #fff !important; }
        .mem-pill.on .mem-dot { background: rgba(255,255,255,.9); transform: scale(1.2); }
        .mem-pill:hover:not(.on) { opacity: .82; }
        .mem-pill[data-m="all"]     { border-color: rgba(255,255,255,.5); color: #fff; }
        .mem-pill[data-m="all"].on  { background: rgba(255,255,255,.12); border-color: rgba(255,255,255,.6); }
        .mem-pill[data-m="donal"]   { border-color: var(--donal); color: var(--donal); }
        .mem-pill[data-m="donal"].on   { background: var(--donal); border-color: var(--donal); }
        .mem-pill[data-m="nicola"]  { border-color: var(--nicola); color: var(--nicola); }
        .mem-pill[data-m="nicola"].on  { background: var(--nicola); border-color: var(--nicola); }
        .mem-pill[data-m="aoife"]   { border-color: var(--aoife); color: var(--aoife); }
        .mem-pill[data-m="aoife"].on   { background: var(--aoife); border-color: var(--aoife); }

        /* ── CALENDAR MAIN ───────────────────────────────── */
        #cal-main { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

        /* ── MONTH VIEW ──────────────────────────────────── */
        .m-dow-row {
            display: grid; grid-template-columns: repeat(7,1fr);
            background: var(--surface); border-bottom: 2px solid var(--border); flex-shrink: 0;
        }
        .m-dow {
            padding: 11px 8px; text-align: center; font-size: 12px; font-weight: 800;
            text-transform: uppercase; letter-spacing: .07em; color: var(--muted);
        }
        /* weekend columns subtle tint */
        .m-dow:first-child, .m-dow:last-child { color: rgba(180,160,255,.7); }
        .m-days { display: grid; grid-template-columns: repeat(7,1fr); flex: 1; overflow-y: auto; }
        .m-day {
            border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
            padding: 7px 6px; min-height: 130px; cursor: pointer; transition: background .12s;
            position: relative;
        }
        .m-day:hover { background: rgba(99,102,241,.06); }
        .m-day:hover::after {
            content: '＋'; position: absolute; bottom: 6px; right: 8px;
            font-size: 16px; color: rgba(99,102,241,.4); font-weight: 900;
        }
        /* weekend day subtle background */
        .m-days .m-day:nth-child(7n+1),
        .m-days .m-day:nth-child(7n) { background: rgba(99,102,241,.025); }
        .m-days .m-day:nth-child(7n+1):hover,
        .m-days .m-day:nth-child(7n):hover { background: rgba(99,102,241,.07); }
        .m-day.other { opacity: .3; }
        .m-day.today { background: rgba(99,102,241,.08) !important; }
        .m-day.today .dnum {
            background: linear-gradient(135deg,#5B5EE8,#7C3AED);
            color: #fff; box-shadow: 0 3px 12px rgba(99,102,241,.5);
        }
        .dnum {
            width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-size: 14px; font-weight: 800; margin-bottom: 4px;
            transition: background .15s;
        }
        /* Event chips in month */
        .ev-chip {
            padding: 4px 8px; border-radius: 7px; font-size: 12px; font-weight: 700;
            margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            cursor: pointer; border-left: 4px solid; transition: filter .15s, transform .1s;
            display: flex; align-items: center; gap: 4px;
        }
        .ev-chip:hover { filter: brightness(1.2); transform: translateX(1px); }
        .ev-chip .chip-title { overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }
        .chip-tag-dots { display: flex; gap: 3px; flex-shrink: 0; }
        .chip-tag-dot { width: 7px; height: 7px; border-radius: 50%; }
        .chip-attach-icon { font-size: 10px; opacity: .85; flex-shrink: 0; }
        .more-ev {
            font-size: 12px; color: var(--muted); font-weight: 700; padding: 3px 6px;
            background: rgba(255,255,255,.06); border-radius: 6px; display: inline-block; margin-top: 1px;
        }

        /* ── WEEK VIEW ───────────────────────────────────── */
        .wk-wrap { display: flex; flex-direction: column; height: 100%; }
        .wk-head {
            display: grid; grid-template-columns: 64px repeat(7,1fr);
            background: var(--surface); border-bottom: 2px solid var(--border); flex-shrink: 0;
        }
        .wk-head-day {
            padding: 12px 8px; text-align: center; border-left: 1px solid var(--border);
            cursor: pointer; transition: background .15s;
        }
        .wk-head-day:hover { background: rgba(255,255,255,.05); }
        .wk-head-day .wd {
            font-size: 11px; font-weight: 800; text-transform: uppercase;
            color: var(--muted); letter-spacing: .06em;
        }
        .wk-head-day .wdn {
            font-size: 26px; font-weight: 900; color: var(--text); line-height: 1.1; margin-top: 3px;
        }
        .wk-head-day.wk-today .wdn {
            background: linear-gradient(135deg,#5B5EE8,#7C3AED); color: #fff;
            width: 42px; height: 42px; border-radius: 50%; font-size: 19px;
            display: flex; align-items: center; justify-content: center;
            margin: 3px auto 0; box-shadow: 0 3px 14px rgba(99,102,241,.5);
        }
        .wk-allday-row {
            display: grid; grid-template-columns: 64px repeat(7,1fr);
            border-bottom: 1px solid var(--border); background: rgba(0,0,0,.2);
            flex-shrink: 0; min-height: 32px;
        }
        .wk-allday-lbl {
            font-size: 10px; font-weight: 800; color: var(--muted); text-transform: uppercase;
            display: flex; align-items: center; justify-content: flex-end;
            padding-right: 8px; letter-spacing: .05em;
        }
        .wk-allday-cell { border-left: 1px solid var(--border); padding: 4px; }
        .wk-scroll { flex: 1; overflow-y: auto; }
        .wk-body { display: grid; grid-template-columns: 64px repeat(7,1fr); }
        .time-lbl {
            height: 60px; display: flex; align-items: flex-start; justify-content: flex-end;
            padding: 4px 10px 0 0; font-size: 11px; color: var(--muted); font-weight: 600;
        }
        .wk-day-col { border-left: 1px solid var(--border); position: relative; }
        .hr-cell {
            height: 60px; border-bottom: 1px solid rgba(255,255,255,.045); cursor: pointer;
            transition: background .12s;
        }
        .hr-cell:hover { background: rgba(99,102,241,.05); }
        .timed-ev {
            position: absolute; left: 3px; right: 3px; border-radius: 8px;
            padding: 4px 7px; font-size: 11px; font-weight: 700; overflow: hidden;
            cursor: pointer; z-index: 5; border-left: 4px solid; transition: filter .15s, z-index 0s;
            box-shadow: 0 2px 8px rgba(0,0,0,.25);
        }
        .timed-ev:hover { filter: brightness(1.2); z-index: 10; }

        /* Current time line */
        .now-line {
            position: absolute; left: 0; right: 0; height: 2px;
            background: #EF4444; z-index: 20; pointer-events: none;
        }
        .now-line::before {
            content: ''; position: absolute; left: -5px; top: -5px;
            width: 12px; height: 12px; border-radius: 50%; background: #EF4444;
        }

        /* ── DAY VIEW ────────────────────────────────────── */
        .day-wrap { display: flex; flex-direction: column; height: 100%; }
        .day-allday {
            background: rgba(0,0,0,.2); border-bottom: 1px solid var(--border);
            padding: 10px 16px; flex-shrink: 0; display: none;
        }
        .day-allday.has-ev { display: block; }
        .day-allday-lbl {
            font-size: 11px; font-weight: 800; text-transform: uppercase;
            color: var(--muted); margin-bottom: 7px; letter-spacing: .06em;
        }
        .day-scroll { flex: 1; overflow-y: auto; }
        .day-body { display: grid; grid-template-columns: 64px 1fr; }
        .day-col { position: relative; border-left: 1px solid var(--border); }
        .day-ev {
            position: absolute; left: 6px; right: 6px; border-radius: 10px;
            padding: 7px 12px; font-size: 13px; font-weight: 700; overflow: hidden;
            cursor: pointer; z-index: 5; border-left: 5px solid; transition: filter .15s;
            box-shadow: 0 3px 12px rgba(0,0,0,.3);
        }
        .day-ev:hover { filter: brightness(1.15); z-index: 10; }
        .day-ev .ev-time { font-size: 11px; font-weight: 600; opacity: .85; margin-top: 3px; }
        .day-ev .ev-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
        .day-ev .ev-tag-chip { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 700; }

        /* ── YEAR VIEW ───────────────────────────────────── */
        .yr-grid {
            display: grid; grid-template-columns: repeat(4,1fr);
            gap: 16px; padding: 20px; overflow-y: auto; height: 100%;
        }
        @media(max-width:960px){ .yr-grid { grid-template-columns: repeat(3,1fr); } }
        @media(max-width:640px){ .yr-grid { grid-template-columns: repeat(2,1fr); } }
        .mini-mo {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius-md); padding: 14px; cursor: pointer;
            transition: transform .15s, box-shadow .15s, border-color .15s;
        }
        .mini-mo:hover {
            transform: translateY(-3px); box-shadow: 0 10px 36px rgba(0,0,0,.4);
            border-color: rgba(99,102,241,.35);
        }
        .mini-mo-title {
            font-size: 14px; font-weight: 900; text-align: center; margin-bottom: 9px;
            color: var(--text);
        }
        .mini-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 1px; }
        .mini-dow-h {
            font-size: 8px; text-align: center; color: var(--muted);
            font-weight: 800; text-transform: uppercase; padding: 2px 0;
        }
        .mini-d {
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
            font-size: 9px; border-radius: 50%; font-weight: 600;
            position: relative; flex-direction: column; gap: 1px;
        }
        .mini-d.m-today {
            background: linear-gradient(135deg,#5B5EE8,#7C3AED);
            color: #fff; font-weight: 900;
        }
        .mini-d .dot-row { display: flex; gap: 1px; }
        .mini-d .dot { width: 3px; height: 3px; border-radius: 50%; }

        /* ── MODAL BASE ──────────────────────────────────── */
        .modal-bg {
            position: fixed; inset: 0; background: rgba(0,0,0,.78); z-index: 300;
            display: flex; align-items: center; justify-content: center; padding: 20px;
            backdrop-filter: blur(4px);
        }
        .modal-bg.hidden { display: none !important; }
        .modal-box {
            background: var(--surface); border-radius: var(--radius-lg); padding: 32px;
            width: min(580px,100%); max-height: 92vh; overflow-y: auto;
            border: 1px solid var(--border2); box-shadow: 0 24px 70px rgba(0,0,0,.7);
        }
        .modal-title { font-size: 24px; font-weight: 900; margin-bottom: 24px; }
        .modal-acts { display: flex; gap: 12px; margin-top: 24px; flex-wrap: wrap; }
        .btn-cancel {
            flex: 1; padding: 15px; background: var(--elevated);
            border: 1px solid var(--border2); border-radius: var(--radius-sm);
            color: var(--text); font-size: 15px; font-weight: 700; cursor: pointer;
            transition: background .15s; min-width: 90px;
        }
        .btn-cancel:hover { background: var(--elevated2); }
        .btn-del {
            flex: 1; padding: 15px; background: rgba(239,68,68,.14);
            border: 2px solid rgba(239,68,68,.28); border-radius: var(--radius-sm);
            color: #F87171; font-size: 15px; font-weight: 700; cursor: pointer;
            transition: background .15s; min-width: 90px;
        }
        .btn-del:hover { background: rgba(239,68,68,.26); }
        .btn-save {
            flex: 2; padding: 15px; background: linear-gradient(135deg,#5B5EE8,#7C3AED);
            border: none; border-radius: var(--radius-sm); color: #fff;
            font-size: 16px; font-weight: 800; cursor: pointer; transition: transform .1s, box-shadow .2s;
            min-width: 110px; box-shadow: 0 4px 16px rgba(99,102,241,.35);
        }
        .btn-save:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(99,102,241,.5); }
        .btn-save:active { transform: translateY(0); }
        .section-divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

        /* ── TAGS ────────────────────────────────────────── */
        .tags-area {
            background: var(--elevated); border: 2px solid var(--border);
            border-radius: var(--radius-sm); padding: 14px;
        }
        .tags-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
        .tag-pill {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 7px 13px; border-radius: 24px; font-size: 13px; font-weight: 800;
            cursor: pointer; transition: all .15s; border: 2px solid transparent;
            background: var(--bg); color: var(--muted);
        }
        .tag-pill.sel { color: #fff !important; }
        .tag-pill .tag-x {
            width: 17px; height: 17px; border-radius: 50%; border: none;
            background: rgba(0,0,0,.3); color: inherit; font-size: 11px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            opacity: .75; transition: opacity .15s, background .15s; padding: 0; line-height: 1;
        }
        .tag-pill .tag-x:hover { opacity: 1; background: rgba(0,0,0,.55); }
        .tag-empty { font-size: 13px; color: var(--muted); font-style: italic; margin-bottom: 10px; }
        .btn-new-tag {
            padding: 7px 14px; border: 2px dashed rgba(255,255,255,.2); border-radius: 24px;
            background: transparent; color: var(--muted); font-size: 13px; font-weight: 700;
            cursor: pointer; transition: all .15s;
        }
        .btn-new-tag:hover { border-color: #818CF8; color: #818CF8; }
        .new-tag-form { display: flex; gap: 8px; align-items: center; margin-top: 10px; flex-wrap: wrap; }
        .new-tag-form input[type=text] {
            flex: 1; padding: 9px 12px; background: var(--bg); border: 2px solid var(--border);
            border-radius: var(--radius-sm); color: var(--text); font-size: 14px; outline: none; min-width: 110px;
        }
        .new-tag-form input[type=text]:focus { border-color: #818CF8; }
        .new-tag-form input[type=color] { width: 42px; height: 40px; border: none; border-radius: 8px; cursor: pointer; padding: 3px; background: var(--bg); }
        .new-tag-form button { padding: 9px 14px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 800; cursor: pointer; border: none; }
        .btn-tag-add { background: linear-gradient(135deg,#5B5EE8,#7C3AED); color: #fff; }
        .btn-tag-cancel { background: var(--bg); color: var(--muted); border: 2px solid var(--border) !important; }

<script>
// ═══════════════════════════════════════════════════════════
// CRYPTO
// ═══════════════════════════════════════════════════════════
const Cry = {
    async hash(pw, salt) {
        const enc = new TextEncoder();
        const buf = await crypto.subtle.digest('SHA-256', enc.encode(pw + salt));
        return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
    },
    async key(pw, salt) {
        const enc = new TextEncoder();
        const km = await crypto.subtle.importKey('raw', enc.encode(pw), 'PBKDF2', false, ['deriveKey']);
        return crypto.subtle.deriveKey(
            { name:'PBKDF2', salt:enc.encode(salt), iterations:150000, hash:'SHA-256' },
            km, { name:'AES-GCM', length:256 }, false, ['encrypt','decrypt']
        );
    },
    async enc(key, data) {
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const buf = await crypto.subtle.encrypt({name:'AES-GCM',iv}, key, new TextEncoder().encode(JSON.stringify(data)));
        return btoa(JSON.stringify({iv:[...iv],d:[...new Uint8Array(buf)]}));
    },
    async dec(key, str) {
        const {iv,d} = JSON.parse(atob(str));
        const buf = await crypto.subtle.decrypt({name:'AES-GCM',iv:new Uint8Array(iv)}, key, new Uint8Array(d));
        return JSON.parse(new TextDecoder().decode(buf));
    }
};

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
const S = {
    key: null,
    events: [],
    tags: [],
    view: 'month',
    cur: new Date(),
    members: new Set(['donal','nicola','aoife','family']),
    famName: 'Family'
};

// Modal transient state
let M = { tags: [], attach: [] };

const MC = {
    donal:  { color:'#3B82F6', bg:'rgba(59,130,246,.18)',  name:'Donal' },
    nicola: { color:'#EC4899', bg:'rgba(236,72,153,.18)',   name:'Nicola' },
    aoife:  { color:'#10B981', bg:'rgba(16,185,129,.18)',   name:'Aoife' },
    family: { color:'#F59E0B', bg:'rgba(245,158,11,.18)',   name:'All Family' }
};

const DAYS  = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONS  = ['January','February','March','April','May','June',
               'July','August','September','October','November','December'];
const HOURS = Array.from({length:24},(_,i)=>i);

// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════
function fmtD(d)  { return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function pad(n)   { return String(n).padStart(2,'0'); }
function addD(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
function todayStr(){ return fmtD(new Date()); }
function fmtShort(d){ return MONS[d.getMonth()].slice(0,3)+' '+d.getDate(); }
function parseLocalDate(s){ return new Date(s+'T12:00:00'); }
function weekStart(d){ const x=new Date(d); x.setDate(x.getDate()-x.getDay()); return x; }

function isImg(p){ return /\.(jpg|jpeg|png|gif|webp|svg|avif)$/i.test(p); }
function fileIcon(p){
    if(isImg(p)) return '🖼️';
    if(/\.pdf$/i.test(p)) return '📄';
    if(/\.(doc|docx)$/i.test(p)) return '📝';
    if(/\.(mp4|mov|avi|mkv)$/i.test(p)) return '🎬';
    if(/\.(mp3|wav|aac)$/i.test(p)) return '🎵';
    if(/\.(zip|rar|gz)$/i.test(p)) return '🗜️';
    return '📎';
}

function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function fmtDateRange(ev){
    const s=parseLocalDate(ev.startDate), e=ev.endDate?parseLocalDate(ev.endDate):null;
    const ds=DAYS[s.getDay()]+', '+MONS[s.getMonth()]+' '+s.getDate()+', '+s.getFullYear();
    if(!e || ev.startDate===ev.endDate) return ds;
    return ds+' → '+MONS[e.getMonth()]+' '+e.getDate()+', '+e.getFullYear();
}

function evVisible(ev){ if(ev.member==='family') return true; return S.members.has(ev.member); }
function evOnDate(ev,ds){ const s=ev.startDate, e=ev.endDate||ev.startDate; return ds>=s&&ds<=e&&evVisible(ev); }
function evsByDate(ds){ return S.events.filter(ev=>evOnDate(ev,ds)); }

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2); }

// ═══════════════════════════════════════════════════════════
// STORAGE  (saves {events, tags} as one encrypted blob)
// ═══════════════════════════════════════════════════════════
const Store = {
    async save() {
        if(!S.key) return;
        localStorage.setItem('fc_data', await Cry.enc(S.key, { events:S.events, tags:S.tags }));
    },
    async load() {
        const raw = localStorage.getItem('fc_data') || localStorage.getItem('fc_ev');
        if(!raw) return { events:[], tags:[] };
        try {
            const d = await Cry.dec(S.key, raw);
            if(Array.isArray(d)) return { events:d, tags:[] }; // legacy format
            return { events: d.events||[], tags: d.tags||[] };
        } catch { return { events:[], tags:[] }; }
    }
};

// ═══════════════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════════════
const Auth = {
    async setup() {
        const name=document.getElementById('s-name').value.trim();
        const pw=document.getElementById('s-pass').value;
        const cf=document.getElementById('s-conf').value;
        const err=t=>document.getElementById('s-err').textContent=t;
        if(!name) return err('Please enter your family name.');
        if(pw.length<6) return err('Password must be at least 6 characters.');
        if(pw!==cf) return err('Passwords do not match.');
        const salt=btoa(crypto.getRandomValues(new Uint8Array(12)).join(''));
        const hash=await Cry.hash(pw,salt);
        localStorage.setItem('fc_setup','1'); localStorage.setItem('fc_fam',name);
        localStorage.setItem('fc_hash',hash); localStorage.setItem('fc_salt',salt);
        document.getElementById('s-err').textContent='';
        Auth.showLogin();
    },
    async login() {
        const pw=document.getElementById('l-pass').value;
        const err=document.getElementById('l-err');
        const hash=await Cry.hash(pw,localStorage.getItem('fc_salt'));
        if(hash!==localStorage.getItem('fc_hash')){ err.textContent='Incorrect password. Please try again.'; return; }
        S.key=await Cry.key(pw,localStorage.getItem('fc_salt'));
        S.famName=localStorage.getItem('fc_fam')||'Family';
        const d=await Store.load();
        S.events=d.events; S.tags=d.tags;
        document.getElementById('l-pass').value=''; err.textContent='';
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('hdr-title').textContent=S.famName+' Calendar';
        document.getElementById('app').classList.remove('hidden');
        Cal.render();
    },
    logout() {
        S.key=null; S.events=[]; S.tags=[];
        document.getElementById('app').classList.add('hidden');
        document.getElementById('l-pass').value='';
        Auth.showLogin();
    },
    showLogin() {
        document.getElementById('login-title').textContent=(localStorage.getItem('fc_fam')||'Family')+' Calendar';
        document.getElementById('login-screen').classList.remove('hidden');
        document.getElementById('setup-screen').classList.add('hidden');
        setTimeout(()=>document.getElementById('l-pass').focus(),80);
    },
    init() {
        if(localStorage.getItem('fc_setup')) Auth.showLogin();
        else document.getElementById('setup-screen').classList.remove('hidden');
    }
};

// ═══════════════════════════════════════════════════════════
// EVENTS CRUD
// ═══════════════════════════════════════════════════════════
const Ev = {
    add(e)    { e.id=uid(); S.events.push(e); Store.save(); },
    upd(id,e) { const i=S.events.findIndex(x=>x.id===id); if(i>=0){S.events[i]={...e,id};Store.save();} },
    del(id)   { S.events=S.events.filter(x=>x.id!==id); Store.save(); }
};

// ═══════════════════════════════════════════════════════════
// TAGS CRUD
// ═══════════════════════════════════════════════════════════
const Tags = {
    add(t)    { t.id='t'+uid(); S.tags.push(t); Store.save(); return t; },
    del(id)   {
        S.tags=S.tags.filter(t=>t.id!==id);
        S.events.forEach(ev=>{ if(ev.tags) ev.tags=ev.tags.filter(x=>x!==id); });
        Store.save();
    },
    get(id)   { return S.tags.find(t=>t.id===id); }
};

// ═══════════════════════════════════════════════════════════
// CALENDAR RENDERING
// ═══════════════════════════════════════════════════════════
const Cal = {
    setView(v,btn) {
        S.view=v;
        document.querySelectorAll('[data-v]').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active'); Cal.render();
    },
    togMem(m,btn) {
        if(m==='all'){
            const allOn=['donal','nicola','aoife'].every(x=>S.members.has(x));
            const t=!allOn;
            ['donal','nicola','aoife','family'].forEach(x=>t?S.members.add(x):S.members.delete(x));
            document.querySelectorAll('[data-m]').forEach(b=>{ if(b.dataset.m!=='all') b.classList.toggle('on',t); });
            btn.classList.toggle('on',t);
        } else {
            S.members.has(m)?S.members.delete(m):S.members.add(m);
            btn.classList.toggle('on',S.members.has(m));
            const allOn=['donal','nicola','aoife'].every(x=>S.members.has(x));
            document.querySelector('[data-m="all"]').classList.toggle('on',allOn);
        }
        Cal.render();
    },
    prev(){ const d=S.cur; if(S.view==='month') d.setMonth(d.getMonth()-1); else if(S.view==='week') d.setDate(d.getDate()-7); else if(S.view==='day') d.setDate(d.getDate()-1); else d.setFullYear(d.getFullYear()-1); S.cur=new Date(d); Cal.render(); },
    next(){ const d=S.cur; if(S.view==='month') d.setMonth(d.getMonth()+1); else if(S.view==='week') d.setDate(d.getDate()+7); else if(S.view==='day') d.setDate(d.getDate()+1); else d.setFullYear(d.getFullYear()+1); S.cur=new Date(d); Cal.render(); },
    goToday(){ S.cur=new Date(); Cal.render(); },
    goDay(ds){ S.cur=parseLocalDate(ds); S.view='day'; document.querySelectorAll('[data-v]').forEach(b=>b.classList.remove('active')); document.querySelector('[data-v="day"]').classList.add('active'); Cal.render(); },
    goMonth(y,m){ S.cur=new Date(y,m,1); S.view='month'; document.querySelectorAll('[data-v]').forEach(b=>b.classList.remove('active')); document.querySelector('[data-v="month"]').classList.add('active'); Cal.render(); },

    render() {
        const main=document.getElementById('cal-main'), pl=document.getElementById('period-lbl');
        const {cur,view}=S;
        if(view==='month'){ pl.textContent=MONS[cur.getMonth()]+' '+cur.getFullYear(); main.innerHTML=Cal.month(); }
        else if(view==='week'){ const ws=weekStart(cur),we=addD(ws,6); pl.textContent=fmtShort(ws)+' – '+fmtShort(we); main.innerHTML=Cal.week(); Cal.scrollTo8(document.getElementById('wk-scroll')); }
        else if(view==='day'){ pl.textContent=DAYS[cur.getDay()]+', '+MONS[cur.getMonth()]+' '+cur.getDate()+', '+cur.getFullYear(); main.innerHTML=Cal.day(); Cal.scrollTo8(document.getElementById('day-scroll')); }
        else if(view==='year'){ pl.textContent=String(cur.getFullYear()); main.innerHTML=Cal.year(); }
    },
    scrollTo8(el){ if(el) setTimeout(()=>{ el.scrollTop=8*60-60; Cal.tickNow(); },30); },

    nowPx(){ const n=new Date(); return n.getHours()*60+n.getMinutes(); },
    tickNow(){
        document.querySelectorAll('.now-line').forEach(el=>el.style.top=Cal.nowPx()+'px');
        clearTimeout(Cal._nowTimer);
        Cal._nowTimer=setTimeout(Cal.tickNow,60000);
    },
    nowLineHtml(isToday){ return isToday?`<div class="now-line" style="top:${Cal.nowPx()}px;"></div>`:''; },

    chipHtml(ev, stopProp) {
        const mc=MC[ev.member]||MC.family;
        const tagDots=(ev.tags||[]).slice(0,3).map(tid=>{ const t=Tags.get(tid); return t?`<span class="chip-tag-dot" style="background:${t.color};" title="${escHtml(t.name)}"></span>`:''; }).join('');
        const attachIcon=(ev.attachments||[]).length?'<span class="chip-attach-icon">📎</span>':'';
        const clickFn=stopProp?`event.stopPropagation();Detail.show('${ev.id}')`:`Detail.show('${ev.id}')`;
        return `<div class="ev-chip" style="background:${mc.bg};color:${mc.color};border-left-color:${mc.color};"
            onclick="${clickFn}" title="${escHtml(ev.title)}">
            <span class="chip-title">${escHtml(ev.title)}</span>
            <span class="chip-tag-dots">${tagDots}</span>${attachIcon}
        </div>`;
    },

    month() {
        const y=S.cur.getFullYear(),m=S.cur.getMonth(),today=todayStr();
        const first=new Date(y,m,1),last=new Date(y,m+1,0);
        const startDow=first.getDay(),daysInPrev=new Date(y,m,0).getDate();
        let cells=[];
        for(let i=0;i<startDow;i++) cells.push({d:daysInPrev-startDow+1+i,mo:m-1,y,other:true});
        for(let d=1;d<=last.getDate();d++) cells.push({d,mo:m,y,other:false});
        while(cells.length<42) cells.push({d:cells.length-startDow-last.getDate()+1,mo:m+1,y,other:true});

        let h=`<div style="display:flex;flex-direction:column;height:100%;">
            <div class="m-dow-row">${DAYS.map(d=>`<div class="m-dow">${d}</div>`).join('')}</div>
            <div class="m-days">`;
        cells.forEach(c=>{
            const date=new Date(c.y,c.mo,c.d), ds=fmtD(date), isT=ds===today;
            const evs=evsByDate(ds);
            h+=`<div class="m-day${c.other?' other':''}${isT?' today':''}" onclick="Mod.openNew('${ds}')">
                <div class="dnum">${c.d}</div>`;
            const max=3;
            evs.slice(0,max).forEach(ev=>{ h+=Cal.chipHtml(ev,true); });
            if(evs.length>max) h+=`<div class="more-ev">+${evs.length-max} more</div>`;
            h+=`</div>`;
        });
        h+=`</div></div>`; return h;
    },

    week() {
        const ws=weekStart(S.cur),today=todayStr();
        const days=Array.from({length:7},(_,i)=>addD(ws,i));
        let h=`<div class="wk-wrap">
            <div class="wk-head"><div></div>${days.map(d=>{ const ds=fmtD(d),isT=ds===today; return `<div class="wk-head-day${isT?' wk-today':''}" onclick="Cal.goDay('${ds}')"><div class="wd">${DAYS[d.getDay()]}</div><div class="wdn">${d.getDate()}</div></div>`; }).join('')}</div>`;
        const adEvs=days.map(d=>evsByDate(fmtD(d)).filter(e=>e.allDay));
        if(adEvs.some(x=>x.length)){
            h+=`<div class="wk-allday-row"><div class="wk-allday-lbl">all day</div>${days.map((_,i)=>`<div class="wk-allday-cell">${adEvs[i].map(ev=>Cal.chipHtml(ev,true)).join('')}</div>`).join('')}</div>`;
        }
        h+=`<div class="wk-scroll" id="wk-scroll"><div class="wk-body">
            <div>${HOURS.map(h2=>`<div class="time-lbl">${h2===0?'':h2<12?h2+'am':h2===12?'12pm':(h2-12)+'pm'}</div>`).join('')}</div>
            ${days.map(d=>{ const ds=fmtD(d),isT=ds===today; const tevs=evsByDate(ds).filter(e=>!e.allDay);
                return `<div class="wk-day-col" onclick="Mod.openNew('${ds}')">
                    ${HOURS.map(()=>`<div class="hr-cell"></div>`).join('')}
                    ${tevs.map(ev=>Cal.timedEv(ev,'week')).join('')}
                    ${Cal.nowLineHtml(isT)}
                </div>`; }).join('')}
        </div></div></div>`; return h;
    },

    day() {
        const ds=fmtD(S.cur), allEvs=evsByDate(ds);
        const adEvs=allEvs.filter(e=>e.allDay), tEvs=allEvs.filter(e=>!e.allDay);
        let h=`<div class="day-wrap">`;
        if(adEvs.length){ h+=`<div class="day-allday has-ev"><div class="day-allday-lbl">All Day</div><div style="display:flex;flex-wrap:wrap;gap:5px;">${adEvs.map(ev=>Cal.chipHtml(ev,true)).join('')}</div></div>`; }
        const isToday=ds===todayStr();
        h+=`<div class="day-scroll" id="day-scroll"><div class="day-body">
            <div>${HOURS.map(h2=>`<div class="time-lbl">${h2===0?'':h2<12?h2+'am':h2===12?'12pm':(h2-12)+'pm'}</div>`).join('')}</div>
            <div class="day-col" onclick="Mod.openNew('${ds}')">
                ${HOURS.map(()=>`<div class="hr-cell"></div>`).join('')}
                ${tEvs.map(ev=>Cal.timedEv(ev,'day')).join('')}
                ${Cal.nowLineHtml(isToday)}
            </div>
        </div></div></div>`; return h;
    },

    timedEv(ev, view) {
        const mc=MC[ev.member]||MC.family;
        const [sh,sm]=(ev.startTime||'00:00').split(':').map(Number);
        const [eh,em]=(ev.endTime||'01:00').split(':').map(Number);
        const top=sh*60+sm, ht=Math.max((eh*60+em)-(sh*60+sm),30);
        const cls=view==='day'?'day-ev':'timed-ev';
        const tagChips=view==='day'&&ht>50?(ev.tags||[]).slice(0,3).map(tid=>{ const t=Tags.get(tid); return t?`<span class="day-ev-tag-chip" style="background:${t.color}20;color:${t.color};border-radius:8px;padding:1px 5px;font-size:9px;font-weight:700;">${escHtml(t.name)}</span>`:''; }).join(''):'' ;
        const timeLabel=view==='day'?`<div class="ev-time">${ev.startTime} – ${ev.endTime}</div>`:'';
        const tagsHtml=tagChips?`<div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:3px;">${tagChips}</div>`:'';
        return `<div class="${cls}" style="top:${top}px;height:${ht}px;background:${mc.bg};color:${mc.color};border-left-color:${mc.color};"
            onclick="event.stopPropagation();Detail.show('${ev.id}')">
            <div>${escHtml(ev.title)}</div>${timeLabel}${tagsHtml}
        </div>`;
    },

    year() {
        const y=S.cur.getFullYear(),today=todayStr();
        let h=`<div class="yr-grid">`;
        for(let m=0;m<12;m++){
            const first=new Date(y,m,1),last=new Date(y,m+1,0),startDow=first.getDay();
            h+=`<div class="mini-mo" onclick="Cal.goMonth(${y},${m})">
                <div class="mini-mo-title">${MONS[m]}</div>
                <div class="mini-grid">${DAYS.map(d=>`<div class="mini-dow-h">${d[0]}</div>`).join('')}`;
            for(let i=0;i<startDow;i++) h+=`<div class="mini-d" style="opacity:.25;">${new Date(y,m,0).getDate()-startDow+1+i}</div>`;
            for(let d=1;d<=last.getDate();d++){
                const ds=`${y}-${pad(m+1)}-${pad(d)}`,isT=ds===today;
                const dayEvs=evsByDate(ds);
                const memColors=[...new Set(dayEvs.map(e=>MC[e.member]?.color||MC.family.color))].slice(0,3);
                const dots=memColors.map(c=>`<div class="dot" style="background:${c};"></div>`).join('');
                h+=`<div class="mini-d${isT?' m-today':''}"><span>${d}</span>${dots?`<div class="dot-row">${dots}</div>`:''}</div>`;
            }
            h+=`</div></div>`;
        }
        h+=`</div>`; return h;
    }
};

// ═══════════════════════════════════════════════════════════
// DETAIL POPUP
// ═══════════════════════════════════════════════════════════
const Detail = {
    evId: null,
    show(id) {
        const ev=S.events.find(e=>e.id===id);
        if(!ev) return;
        Detail.evId=id;
        const mc=MC[ev.member]||MC.family;
        const by=MC[ev.createdBy]||null;

        const dateStr=fmtDateRange(ev);
        const timeStr=ev.allDay?'All Day Event':(ev.startTime&&ev.endTime?`${ev.startTime} – ${ev.endTime}`:'');

        const tagHtml=(ev.tags||[]).map(tid=>{ const t=Tags.get(tid); return t?`<span class="detail-tag" style="background:${t.color}22;color:${t.color};">${escHtml(t.name)}</span>`:''; }).join('');

        const attachHtml=(ev.attachments||[]).map(a=>{
            const icon=fileIcon(a.path), label=escHtml(a.name||a.path);
            const thumb=isImg(a.path)?`<img src="${escHtml(a.path)}" class="detail-attach-thumb" alt="" onerror="this.style.display='none'">`:`<span style="font-size:28px;flex-shrink:0;">${icon}</span>`;
            return `<a href="${escHtml(a.path)}" target="_blank" rel="noopener" class="detail-attach-item">
                ${thumb}
                <div class="detail-attach-info">
                    <div class="detail-attach-name">${label}</div>
                    <div class="detail-attach-path">${escHtml(a.path)}</div>
                </div>
            </a>`;
        }).join('');

        let content=`<div class="detail-header" style="border-left:4px solid ${mc.color};">
            <div class="detail-member-bar">
                <div class="detail-member-dot" style="background:${mc.color};"></div>
                <div class="detail-member-label" style="color:${mc.color};">${escHtml(mc.name)}</div>
            </div>
            <div class="detail-title">${escHtml(ev.title)}</div>
        </div>
        <div class="detail-body">
            <div class="detail-row">
                <div class="detail-row-icon">📅</div>
                <div class="detail-row-content">
                    <div class="detail-row-label">Date</div>
                    <div class="detail-row-value">${escHtml(dateStr)}</div>
                    ${timeStr?`<div class="detail-row-value" style="color:var(--muted);font-size:13px;">${escHtml(timeStr)}</div>`:''}
                </div>
            </div>`;

        if(ev.description){
            content+=`<div class="detail-row">
                <div class="detail-row-icon">📝</div>
                <div class="detail-row-content">
                    <div class="detail-row-label">Description</div>
                    <div class="detail-description">${escHtml(ev.description)}</div>
                </div>
            </div>`;
        }

        if(tagHtml){
            content+=`<div class="detail-row">
                <div class="detail-row-icon">🏷️</div>
                <div class="detail-row-content">
                    <div class="detail-row-label">Tags</div>
                    <div class="detail-tags">${tagHtml}</div>
                </div>
            </div>`;
        }

        if(attachHtml){
            content+=`<div class="detail-row">
                <div class="detail-row-icon">📎</div>
                <div class="detail-row-content">
                    <div class="detail-row-label">Attachments</div>
                    <div class="detail-attaches">${attachHtml}</div>
                </div>
            </div>`;
        }

        content+=`</div>`;
        document.getElementById('detail-content').innerHTML=content;

        const addedBy=by?`Added by <strong>${escHtml(by.name)}</strong>`:'';
        const createdOn=ev.createdAt?` on ${new Date(ev.createdAt).toLocaleDateString('en-IE',{day:'numeric',month:'short',year:'numeric'})}`:'';
        document.getElementById('detail-created').innerHTML=addedBy+createdOn;

        document.getElementById('detail-modal').classList.remove('hidden');
    },
    close(){ document.getElementById('detail-modal').classList.add('hidden'); Detail.evId=null; },
    edit(){ const id=Detail.evId; Detail.close(); Mod.openEdit(id); }
};

document.getElementById('detail-modal').addEventListener('click',function(e){ if(e.target===this) Detail.close(); });

// ═══════════════════════════════════════════════════════════
// MODAL (Edit / Add)
// ═══════════════════════════════════════════════════════════
const Mod = {
    editId: null,

    openNew(dateStr) {
        const ds=dateStr||fmtD(S.cur);
        Mod.editId=null; M={tags:[],attach:[]};
        document.getElementById('mod-title').textContent='Add Event';
        document.getElementById('ev-title').value='';
        document.getElementById('ev-mem').value='donal';
        document.getElementById('ev-by').value='donal';
        document.getElementById('ev-sd').value=ds;
        document.getElementById('ev-ed').value=ds;
        document.getElementById('ev-allday').checked=false;
        document.getElementById('ev-st').value='09:00';
        document.getElementById('ev-et').value='10:00';
        document.getElementById('ev-desc').value='';
        document.getElementById('ev-times').style.display='';
        document.getElementById('btn-del').classList.add('hidden');
        Mod.hideTagForm();
        Mod.renderTags(); Mod.renderAttach();
        document.getElementById('ev-modal').classList.remove('hidden');
        setTimeout(()=>document.getElementById('ev-title').focus(),80);
    },

    openEdit(id) {
        const ev=S.events.find(e=>e.id===id);
        if(!ev) return;
        Mod.editId=id; M={tags:[...(ev.tags||[])], attach:[...(ev.attachments||[])]};
        document.getElementById('mod-title').textContent='Edit Event';
        document.getElementById('ev-title').value=ev.title;
        document.getElementById('ev-mem').value=ev.member;
        document.getElementById('ev-by').value=ev.createdBy||'donal';
        document.getElementById('ev-sd').value=ev.startDate;
        document.getElementById('ev-ed').value=ev.endDate||ev.startDate;
        document.getElementById('ev-allday').checked=!!ev.allDay;
        document.getElementById('ev-st').value=ev.startTime||'09:00';
        document.getElementById('ev-et').value=ev.endTime||'10:00';
        document.getElementById('ev-desc').value=ev.description||'';
        document.getElementById('ev-times').style.display=ev.allDay?'none':'';
        document.getElementById('btn-del').classList.remove('hidden');
        Mod.hideTagForm();
        Mod.renderTags(); Mod.renderAttach();
        document.getElementById('ev-modal').classList.remove('hidden');
    },

    close() { document.getElementById('ev-modal').classList.add('hidden'); Mod.editId=null; },
    togAllDay(cb) { document.getElementById('ev-times').style.display=cb.checked?'none':''; },

    // ── TAGS ──
    renderTags() {
        const grid=document.getElementById('tags-grid');
        if(!S.tags.length){
            grid.innerHTML=`<span class="tag-empty">No tags yet — create your first one below</span>`; return;
        }
        grid.innerHTML=S.tags.map(t=>{
            const sel=M.tags.includes(t.id);
            const style=sel?`background:${t.color};color:#fff;border-color:${t.color};`:`border-color:${t.color}33;color:${t.color};`;
            return `<span class="tag-pill${sel?' sel':''}" style="${style}" onclick="Mod.togTag('${t.id}')">
                ${escHtml(t.name)}
                <button class="tag-x" onclick="event.stopPropagation();Mod.delTag('${t.id}')" title="Delete tag">×</button>
            </span>`;
        }).join('');
    },
    togTag(id){
        const i=M.tags.indexOf(id);
        if(i>=0) M.tags.splice(i,1); else M.tags.push(id);
        Mod.renderTags();
    },
    delTag(id){
        if(!confirm('Delete this tag from all events?')) return;
        Tags.del(id);
        M.tags=M.tags.filter(x=>x!==id);
        Mod.renderTags();
    },
    showTagForm(){
        document.getElementById('new-tag-form').classList.remove('hidden');
        document.getElementById('btn-show-tag').classList.add('hidden');
        document.getElementById('ntag-name').value='';
        setTimeout(()=>document.getElementById('ntag-name').focus(),60);
    },
    hideTagForm(){
        document.getElementById('new-tag-form').classList.add('hidden');
        document.getElementById('btn-show-tag').classList.remove('hidden');
    },
    createTag(){
        const name=document.getElementById('ntag-name').value.trim();
        const color=document.getElementById('ntag-color').value;
        if(!name) return document.getElementById('ntag-name').focus();
        const t=Tags.add({name,color});
        M.tags.push(t.id);
        Mod.hideTagForm();
        Mod.renderTags();
    },

    // ── ATTACHMENTS ──
    renderAttach() {
        const list=document.getElementById('attach-list');
        if(!M.attach.length){ list.innerHTML=''; return; }
        list.innerHTML=M.attach.map((a,i)=>`
            <div class="attach-item">
                <span class="attach-item-icon">${fileIcon(a.path)}</span>
                <div class="attach-item-info">
                    <div class="attach-item-name">${escHtml(a.name||a.path)}</div>
                    <div class="attach-item-path">${escHtml(a.path)}</div>
                </div>
                <button class="attach-remove" onclick="Mod.removeAttach(${i})" title="Remove">×</button>
            </div>`).join('');
    },
    addAttach(){
        const path=document.getElementById('attach-path').value.trim();
        const name=document.getElementById('attach-name').value.trim();
        if(!path) return document.getElementById('attach-path').focus();
        const baseName=path.split('/').pop().split('?')[0];
        M.attach.push({path, name:name||baseName});
        document.getElementById('attach-path').value='';
        document.getElementById('attach-name').value='';
        Mod.renderAttach();
    },
    removeAttach(i){ M.attach.splice(i,1); Mod.renderAttach(); },

    // ── SAVE / DELETE ──
    save() {
        const title=document.getElementById('ev-title').value.trim();
        const titleEl=document.getElementById('ev-title');
        if(!title){ titleEl.style.borderColor='#F87171'; titleEl.focus(); setTimeout(()=>titleEl.style.borderColor='',2000); return; }
        const allDay=document.getElementById('ev-allday').checked;
        const now=new Date().toISOString();
        const ev={
            title,
            member:      document.getElementById('ev-mem').value,
            createdBy:   document.getElementById('ev-by').value,
            startDate:   document.getElementById('ev-sd').value,
            endDate:     document.getElementById('ev-ed').value,
            allDay,
            startTime:   allDay?null:document.getElementById('ev-st').value,
            endTime:     allDay?null:document.getElementById('ev-et').value,
            description: document.getElementById('ev-desc').value.trim(),
            tags:        [...M.tags],
            attachments: [...M.attach],
            createdAt:   Mod.editId?(S.events.find(e=>e.id===Mod.editId)?.createdAt||now):now
        };
        if(Mod.editId) Ev.upd(Mod.editId,ev); else Ev.add(ev);
        Mod.close(); Cal.render();
    },
    del() {
        if(!Mod.editId) return;
        if(confirm('Delete this event?')){ Ev.del(Mod.editId); Mod.close(); Cal.render(); }
    }
};

document.getElementById('ev-modal').addEventListener('click',function(e){ if(e.target===this) Mod.close(); });
