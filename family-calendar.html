<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Calendar</title>
    <style>
        :root {
            --donal: #3B82F6;
            --donal-bg: rgba(59,130,246,0.18);
            --nicola: #EC4899;
            --nicola-bg: rgba(236,72,153,0.18);
            --aoife: #10B981;
            --aoife-bg: rgba(16,185,129,0.18);
            --family: #F59E0B;
            --family-bg: rgba(245,158,11,0.18);
            --bg: #0F172A;
            --surface: #1E293B;
            --elevated: #273448;
            --border: rgba(255,255,255,0.08);
            --text: #F1F5F9;
            --muted: #94A3B8;
            --radius: 12px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: system-ui,-apple-system,'Segoe UI',sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── SCREENS ───────────────────────────────────────── */
        .screen {
            position: fixed; inset: 0; z-index: 500;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(145deg,#07111f 0%,#1a1040 50%,#07111f 100%);
        }
        .screen.hidden { display: none; }

        .auth-box {
            background: var(--surface);
            border: 1px solid rgba(139,92,246,0.25);
            border-radius: 24px;
            padding: 48px 40px;
            width: min(440px, 92vw);
            box-shadow: 0 0 80px rgba(99,102,241,0.18), 0 20px 60px rgba(0,0,0,0.5);
        }
        .auth-hero { text-align: center; margin-bottom: 32px; }
        .auth-hero .icon { font-size: 60px; display: block; margin-bottom: 10px; }
        .auth-hero h1 {
            font-size: 26px; font-weight: 900;
            background: linear-gradient(135deg,#818CF8,#C084FC,#F472B6);
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .auth-hero p { color: var(--muted); font-size: 14px; margin-top: 6px; }

        .field { margin-bottom: 16px; }
        .field label {
            display: block; font-size: 11px; font-weight: 700;
            text-transform: uppercase; letter-spacing: .06em;
            color: var(--muted); margin-bottom: 7px;
        }
        .field input, .field select, .field textarea {
            width: 100%; padding: 13px 16px;
            background: var(--elevated); border: 2px solid var(--border);
            border-radius: 10px; color: var(--text); font-size: 15px;
            outline: none; transition: border-color .2s; font-family: inherit;
        }
        .field input:focus, .field select:focus, .field textarea:focus { border-color: #818CF8; }
        .field textarea { resize: vertical; min-height: 70px; }
        .field select { cursor: pointer; }

        .btn-main {
            width: 100%; padding: 15px;
            background: linear-gradient(135deg,#6366F1,#8B5CF6);
            border: none; border-radius: 12px; color: #fff;
            font-size: 16px; font-weight: 700; cursor: pointer;
            margin-top: 6px; transition: transform .1s, box-shadow .2s;
        }
        .btn-main:hover { transform: translateY(-1px); box-shadow: 0 8px 28px rgba(99,102,241,.4); }
        .btn-main:active { transform: translateY(0); }
        .auth-err { color: #F87171; font-size: 13px; text-align: center; margin-top: 10px; min-height: 18px; }

        /* ── HEADER ───────────────────────────────────────── */
        #hdr {
            background: linear-gradient(135deg,#1a1040 0%,#2d1b69 100%);
            border-bottom: 1px solid rgba(139,92,246,.3);
            padding: 0 18px; flex-shrink: 0;
        }
        .hdr-top {
            display: flex; align-items: center; gap: 12px;
            padding: 11px 0; flex-wrap: wrap;
        }
        .fam-title {
            font-size: 18px; font-weight: 900; white-space: nowrap;
            background: linear-gradient(135deg,#818CF8,#C084FC);
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav-row { display: flex; align-items: center; gap: 6px; }
        .nav-btn {
            width: 34px; height: 34px; border: none;
            border-radius: 8px; background: rgba(255,255,255,.1);
            color: #fff; font-size: 20px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background .15s; line-height: 1;
        }
        .nav-btn:hover { background: rgba(255,255,255,.2); }
        .today-btn {
            padding: 7px 14px; border: 1px solid rgba(255,255,255,.2);
            border-radius: 8px; background: transparent; color: #fff;
            font-size: 13px; font-weight: 600; cursor: pointer;
            transition: background .15s;
        }
        .today-btn:hover { background: rgba(255,255,255,.1); }
        .period-lbl {
            font-size: 17px; font-weight: 800; color: #fff;
            min-width: 170px; text-align: center;
        }
        .spacer { flex: 1; }
        .btn-add {
            padding: 9px 18px;
            background: linear-gradient(135deg,#6366F1,#8B5CF6);
            border: none; border-radius: 10px; color: #fff;
            font-size: 14px; font-weight: 700; cursor: pointer;
            white-space: nowrap; transition: transform .1s;
        }
        .btn-add:hover { transform: translateY(-1px); }
        .btn-logout {
            padding: 9px 14px; background: rgba(255,255,255,.07);
            border: 1px solid rgba(255,255,255,.1); border-radius: 10px;
            color: var(--muted); font-size: 13px; font-weight: 600;
            cursor: pointer; transition: background .15s;
        }
        .btn-logout:hover { background: rgba(255,255,255,.14); }

        .hdr-bottom {
            display: flex; gap: 14px; padding: 8px 0 12px;
            flex-wrap: wrap; align-items: center;
        }
        .tog-grp {
            display: flex; background: rgba(0,0,0,.35);
            border-radius: 10px; padding: 3px; gap: 2px;
        }
        .view-btn {
            padding: 6px 13px; border: none; border-radius: 7px;
            background: transparent; color: var(--muted);
            font-size: 13px; font-weight: 600; cursor: pointer;
            transition: all .2s;
        }
        .view-btn.active { background: rgba(99,102,246,.75); color: #fff; }

        /* Member pills */
        .mem-pill {
            padding: 6px 14px; border: 2px solid; border-radius: 20px;
            background: transparent; font-size: 12px; font-weight: 800;
            cursor: pointer; transition: all .2s; text-transform: uppercase;
            letter-spacing: .04em; opacity: .55;
        }
        .mem-pill.on { opacity: 1; color: #fff !important; }
        .mem-pill[data-m="all"]   { border-color: #fff; color: #fff; }
        .mem-pill[data-m="all"].on { background: rgba(255,255,255,.15); }
        .mem-pill[data-m="donal"]  { border-color: var(--donal); color: var(--donal); }
        .mem-pill[data-m="donal"].on  { background: var(--donal); }
        .mem-pill[data-m="nicola"] { border-color: var(--nicola); color: var(--nicola); }
        .mem-pill[data-m="nicola"].on { background: var(--nicola); }
        .mem-pill[data-m="aoife"]  { border-color: var(--aoife); color: var(--aoife); }
        .mem-pill[data-m="aoife"].on  { background: var(--aoife); }

        /* ── CALENDAR MAIN ─────────────────────────────────── */
        #cal-main { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

        /* MONTH */
        .m-dow-row {
            display: grid; grid-template-columns: repeat(7,1fr);
            background: var(--surface); border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .m-dow {
            padding: 9px 6px; text-align: center;
            font-size: 11px; font-weight: 700; text-transform: uppercase;
            letter-spacing: .05em; color: var(--muted);
        }
        .m-days {
            display: grid; grid-template-columns: repeat(7,1fr);
            flex: 1; overflow-y: auto;
        }
        .m-day {
            border-right: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            padding: 5px; min-height: 110px; cursor: pointer;
            transition: background .12s;
        }
        .m-day:hover { background: rgba(255,255,255,.03); }
        .m-day.other { opacity: .38; }
        .m-day.today .dnum {
            background: #6366F1; color: #fff;
        }
        .dnum {
            width: 27px; height: 27px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: 700; margin-bottom: 3px;
        }
        .ev-chip {
            padding: 2px 6px; border-radius: 4px; font-size: 11px;
            font-weight: 700; margin-bottom: 2px; white-space: nowrap;
            overflow: hidden; text-overflow: ellipsis; cursor: pointer;
            border-left: 3px solid; transition: filter .15s;
        }
        .ev-chip:hover { filter: brightness(1.15); }
        .more-ev { font-size: 11px; color: var(--muted); font-weight: 600; padding: 2px 4px; }

        /* WEEK */
        .wk-wrap { display: flex; flex-direction: column; height: 100%; }
        .wk-head {
            display: grid; grid-template-columns: 56px repeat(7,1fr);
            background: var(--surface); border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .wk-head-day {
            padding: 10px 6px; text-align: center;
            border-left: 1px solid var(--border); cursor: pointer;
        }
        .wk-head-day:hover { background: rgba(255,255,255,.04); }
        .wk-head-day .wd { font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--muted); letter-spacing: .05em; }
        .wk-head-day .wdn {
            font-size: 22px; font-weight: 900; color: var(--text);
            line-height: 1.1; margin-top: 2px;
        }
        .wk-head-day.wk-today .wdn {
            background: #6366F1; color: #fff;
            width: 36px; height: 36px; border-radius: 50%;
            font-size: 17px; display: flex; align-items: center; justify-content: center;
            margin: 2px auto 0;
        }
        .wk-allday-row {
            display: grid; grid-template-columns: 56px repeat(7,1fr);
            border-bottom: 1px solid var(--border);
            background: rgba(0,0,0,.15); flex-shrink: 0; min-height: 28px;
        }
        .wk-allday-lbl {
            font-size: 9px; font-weight: 700; color: var(--muted);
            text-transform: uppercase; display: flex; align-items: center;
            justify-content: flex-end; padding-right: 6px;
        }
        .wk-allday-cell { border-left: 1px solid var(--border); padding: 3px; }
        .wk-scroll { flex: 1; overflow-y: auto; }
        .wk-body { display: grid; grid-template-columns: 56px repeat(7,1fr); }
        .time-col { }
        .time-lbl {
            height: 60px; display: flex; align-items: flex-start; justify-content: flex-end;
            padding: 3px 7px 0 0; font-size: 10px; color: var(--muted); font-weight: 500;
        }
        .wk-day-col { border-left: 1px solid var(--border); position: relative; }
        .hr-cell { height: 60px; border-bottom: 1px solid rgba(255,255,255,.04); cursor: pointer; }
        .hr-cell:hover { background: rgba(255,255,255,.02); }
        .timed-ev {
            position: absolute; left: 2px; right: 2px; border-radius: 6px;
            padding: 3px 5px; font-size: 10px; font-weight: 700;
            overflow: hidden; cursor: pointer; z-index: 5; border-left: 3px solid;
            transition: filter .15s;
        }
        .timed-ev:hover { filter: brightness(1.15); z-index: 10; }

        /* DAY */
        .day-wrap { display: flex; flex-direction: column; height: 100%; }
        .day-allday {
            background: rgba(0,0,0,.15); border-bottom: 1px solid var(--border);
            padding: 8px 12px; flex-shrink: 0; display: none;
        }
        .day-allday.has-ev { display: block; }
        .day-allday-lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
        .day-scroll { flex: 1; overflow-y: auto; }
        .day-body { display: grid; grid-template-columns: 56px 1fr; }
        .day-col { position: relative; border-left: 1px solid var(--border); }
        .day-ev {
            position: absolute; left: 4px; right: 4px; border-radius: 8px;
            padding: 5px 9px; font-size: 12px; font-weight: 700;
            overflow: hidden; cursor: pointer; z-index: 5; border-left: 4px solid;
            transition: filter .15s;
        }
        .day-ev:hover { filter: brightness(1.12); z-index: 10; }
        .day-ev .ev-time { font-size: 10px; font-weight: 500; opacity: .8; margin-top: 2px; }

        /* YEAR */
        .yr-grid {
            display: grid;
            grid-template-columns: repeat(4,1fr);
            gap: 14px; padding: 18px;
            overflow-y: auto; height: 100%;
        }
        @media(max-width:900px){ .yr-grid { grid-template-columns: repeat(3,1fr); } }
        @media(max-width:600px){ .yr-grid { grid-template-columns: repeat(2,1fr); } }
        .mini-mo {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; padding: 12px; cursor: pointer;
            transition: transform .15s, box-shadow .15s;
        }
        .mini-mo:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,.35); }
        .mini-mo-title { font-size: 13px; font-weight: 800; text-align: center; margin-bottom: 7px; }
        .mini-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 1px; }
        .mini-dow-h { font-size: 7px; text-align: center; color: var(--muted); font-weight: 700; text-transform: uppercase; padding: 1px 0; }
        .mini-d {
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
            font-size: 8px; border-radius: 50%; font-weight: 500;
            position: relative; flex-direction: column; gap: 1px;
        }
        .mini-d.m-today { background: #6366F1; color: #fff; font-weight: 800; }
        .mini-d .dot-row { display: flex; gap: 1px; }
        .mini-d .dot { width: 3px; height: 3px; border-radius: 50%; }

        /* ── MODAL ─────────────────────────────────────────── */
        .modal-bg {
            position: fixed; inset: 0; background: rgba(0,0,0,.72);
            z-index: 300; display: flex; align-items: center;
            justify-content: center; padding: 20px;
        }
        .modal-bg.hidden { display: none; }
        .modal-box {
            background: var(--surface); border-radius: 20px; padding: 30px;
            width: min(520px,100%); max-height: 90vh; overflow-y: auto;
            border: 1px solid var(--border);
            box-shadow: 0 20px 60px rgba(0,0,0,.6);
        }
        .modal-title { font-size: 22px; font-weight: 900; margin-bottom: 22px; }
        .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .chk-row { display: flex; align-items: center; gap: 8px; padding: 10px 0; }
        .chk-row input[type=checkbox] { width: 17px; height: 17px; accent-color: #6366F1; cursor: pointer; }
        .chk-row label { font-size: 14px; font-weight: 600; color: var(--muted); cursor: pointer; }
        .modal-acts { display: flex; gap: 10px; margin-top: 22px; flex-wrap: wrap; }
        .btn-cancel {
            flex: 1; padding: 13px; background: var(--elevated);
            border: 1px solid var(--border); border-radius: 10px;
            color: var(--text); font-size: 14px; font-weight: 600; cursor: pointer;
            transition: background .15s; min-width: 80px;
        }
        .btn-cancel:hover { background: rgba(255,255,255,.12); }
        .btn-del {
            flex: 1; padding: 13px; background: rgba(239,68,68,.15);
            border: 1px solid rgba(239,68,68,.3); border-radius: 10px;
            color: #F87171; font-size: 14px; font-weight: 600; cursor: pointer;
            transition: background .15s; min-width: 80px;
        }
        .btn-del:hover { background: rgba(239,68,68,.28); }
        .btn-save {
            flex: 2; padding: 13px;
            background: linear-gradient(135deg,#6366F1,#8B5CF6);
            border: none; border-radius: 10px; color: #fff;
            font-size: 14px; font-weight: 700; cursor: pointer;
            transition: transform .1s; min-width: 100px;
        }
        .btn-save:hover { transform: translateY(-1px); }
        .hidden { display: none !important; }

        /* scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--elevated); border-radius: 3px; }

        @media(max-width:600px){
            .auth-box { padding: 32px 22px; }
            .hdr-top { gap: 8px; }
            .period-lbl { min-width: 120px; font-size: 14px; }
            .fam-title { font-size: 15px; }
        }
    </style>
</head>
<body>

<!-- ═══════════════════ SETUP SCREEN ═══════════════════ -->
<div id="setup-screen" class="screen hidden">
    <div class="auth-box">
        <div class="auth-hero">
            <span class="icon">📅</span>
            <h1>Family Calendar Setup</h1>
            <p>One-time setup — create your private family password</p>
        </div>
        <div class="field">
            <label>Family Name</label>
            <input type="text" id="s-name" placeholder="e.g. The Murphy Family" autocomplete="off">
        </div>
        <div class="field">
            <label>Create Password</label>
            <input type="password" id="s-pass" placeholder="Choose a strong password">
        </div>
        <div class="field">
            <label>Confirm Password</label>
            <input type="password" id="s-conf" placeholder="Type password again"
                onkeydown="if(event.key==='Enter')Auth.setup()">
        </div>
        <button class="btn-main" onclick="Auth.setup()">Create Family Calendar</button>
        <p class="auth-err" id="s-err"></p>
    </div>
</div>

<!-- ═══════════════════ LOGIN SCREEN ═══════════════════ -->
<div id="login-screen" class="screen hidden">
    <div class="auth-box">
        <div class="auth-hero">
            <span class="icon">🔒</span>
            <h1 id="login-title">Family Calendar</h1>
            <p>Enter your family password to continue</p>
        </div>
        <div class="field">
            <label>Password</label>
            <input type="password" id="l-pass" placeholder="Family password"
                onkeydown="if(event.key==='Enter')Auth.login()">
        </div>
        <button class="btn-main" onclick="Auth.login()">Unlock Calendar</button>
        <p class="auth-err" id="l-err"></p>
    </div>
</div>

<!-- ═══════════════════ MAIN APP ═══════════════════ -->
<div id="app" class="hidden" style="height:100vh;display:flex;flex-direction:column;">

    <header id="hdr">
        <div class="hdr-top">
            <div class="fam-title" id="hdr-title">Family Calendar</div>
            <div class="nav-row">
                <button class="nav-btn" onclick="Cal.prev()">&#8249;</button>
                <button class="today-btn" onclick="Cal.goToday()">Today</button>
                <button class="nav-btn" onclick="Cal.next()">&#8250;</button>
            </div>
            <div class="period-lbl" id="period-lbl"></div>
            <div class="spacer"></div>
            <button class="btn-add" onclick="Mod.openNew()">＋ Add Event</button>
            <button class="btn-logout" onclick="Auth.logout()">Logout</button>
        </div>
        <div class="hdr-bottom">
            <div class="tog-grp">
                <button class="view-btn active" data-v="month" onclick="Cal.setView('month',this)">Month</button>
                <button class="view-btn" data-v="week"  onclick="Cal.setView('week',this)">Week</button>
                <button class="view-btn" data-v="day"   onclick="Cal.setView('day',this)">Day</button>
                <button class="view-btn" data-v="year"  onclick="Cal.setView('year',this)">Year</button>
            </div>
            <div class="tog-grp" style="background:transparent;gap:5px;">
                <button class="mem-pill on" data-m="all"    onclick="Cal.togMem('all',this)">All</button>
                <button class="mem-pill on" data-m="donal"  onclick="Cal.togMem('donal',this)">Donal</button>
                <button class="mem-pill on" data-m="nicola" onclick="Cal.togMem('nicola',this)">Nicola</button>
                <button class="mem-pill on" data-m="aoife"  onclick="Cal.togMem('aoife',this)">Aoife</button>
            </div>
        </div>
    </header>

    <main id="cal-main" style="flex:1;overflow:hidden;display:flex;flex-direction:column;"></main>
</div>

<!-- ═══════════════════ EVENT MODAL ═══════════════════ -->
<div id="ev-modal" class="modal-bg hidden">
    <div class="modal-box">
        <div class="modal-title" id="mod-title">Add Event</div>
        <div class="field">
            <label>Event Title *</label>
            <input type="text" id="ev-title" placeholder="What's happening?">
        </div>
        <div class="field">
            <label>For</label>
            <select id="ev-mem">
                <option value="donal">Donal</option>
                <option value="nicola">Nicola</option>
                <option value="aoife">Aoife</option>
                <option value="family">All Family</option>
            </select>
        </div>
        <div class="field-row">
            <div class="field">
                <label>Start Date</label>
                <input type="date" id="ev-sd">
            </div>
            <div class="field">
                <label>End Date</label>
                <input type="date" id="ev-ed">
            </div>
        </div>
        <div class="chk-row">
            <input type="checkbox" id="ev-allday" onchange="Mod.togAllDay(this)">
            <label for="ev-allday">All Day Event</label>
        </div>
        <div id="ev-times" class="field-row">
            <div class="field">
                <label>Start Time</label>
                <input type="time" id="ev-st">
            </div>
            <div class="field">
                <label>End Time</label>
                <input type="time" id="ev-et">
            </div>
        </div>
        <div class="field">
            <label>Notes (optional)</label>
            <textarea id="ev-notes" placeholder="Add any details…"></textarea>
        </div>
        <div class="modal-acts">
            <button class="btn-cancel" onclick="Mod.close()">Cancel</button>
            <button class="btn-del hidden" id="btn-del" onclick="Mod.del()">Delete</button>
            <button class="btn-save" onclick="Mod.save()">Save Event</button>
        </div>
    </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// CRYPTO
// ═══════════════════════════════════════════════════════════
const Cry = {
    async hash(pw, salt) {
        const enc = new TextEncoder();
        const buf = await crypto.subtle.digest('SHA-256', enc.encode(pw + salt));
        return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
    },
    async key(pw, salt) {
        const enc = new TextEncoder();
        const km = await crypto.subtle.importKey('raw', enc.encode(pw), 'PBKDF2', false, ['deriveKey']);
        return crypto.subtle.deriveKey(
            { name:'PBKDF2', salt:enc.encode(salt), iterations:150000, hash:'SHA-256' },
            km,
            { name:'AES-GCM', length:256 },
            false, ['encrypt','decrypt']
        );
    },
    async enc(key, data) {
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const buf = await crypto.subtle.encrypt(
            {name:'AES-GCM',iv}, key,
            new TextEncoder().encode(JSON.stringify(data))
        );
        return btoa(JSON.stringify({iv:[...iv],d:[...new Uint8Array(buf)]}));
    },
    async dec(key, str) {
        const {iv,d} = JSON.parse(atob(str));
        const buf = await crypto.subtle.decrypt(
            {name:'AES-GCM',iv:new Uint8Array(iv)}, key,
            new Uint8Array(d)
        );
        return JSON.parse(new TextDecoder().decode(buf));
    }
};

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
const S = {
    key: null,
    events: [],
    view: 'month',
    cur: new Date(),
    members: new Set(['donal','nicola','aoife','family']),
    famName: 'Family'
};

const MC = {
    donal:  { color:'#3B82F6', bg:'rgba(59,130,246,.18)',  name:'Donal' },
    nicola: { color:'#EC4899', bg:'rgba(236,72,153,.18)',   name:'Nicola' },
    aoife:  { color:'#10B981', bg:'rgba(16,185,129,.18)',   name:'Aoife' },
    family: { color:'#F59E0B', bg:'rgba(245,158,11,.18)',   name:'All Family' }
};

const DAYS  = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONS  = ['January','February','March','April','May','June',
               'July','August','September','October','November','December'];
const HOURS = Array.from({length:24},(_,i)=>i);

// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════
function fmtD(d)  { return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function pad(n)   { return String(n).padStart(2,'0'); }
function addD(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
function todayStr(){ return fmtD(new Date()); }
function fmtShort(d){ return MONS[d.getMonth()].slice(0,3)+' '+d.getDate(); }
function parseLocalDate(s){ return new Date(s+'T12:00:00'); }

function weekStart(d) {
    const x = new Date(d);
    x.setDate(x.getDate() - x.getDay());
    return x;
}

function evVisible(ev) {
    if (ev.member === 'family') return true;
    return S.members.has(ev.member);
}

function evOnDate(ev, ds) {
    const start = ev.startDate;
    const end   = ev.endDate || ev.startDate;
    return ds >= start && ds <= end && evVisible(ev);
}

function evInRange(ev, a, b) {
    const s = ev.startDate, e = ev.endDate || ev.startDate;
    return s <= b && e >= a && evVisible(ev);
}

function evsByDate(ds)    { return S.events.filter(ev => evOnDate(ev,ds)); }
function evsByRange(a,b)  { return S.events.filter(ev => evInRange(ev,a,b)); }

// ═══════════════════════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════════════════════
const Store = {
    async save() {
        if (!S.key) return;
        localStorage.setItem('fc_ev', await Cry.enc(S.key, S.events));
    },
    async load() {
        const raw = localStorage.getItem('fc_ev');
        if (!raw) return [];
        try { return await Cry.dec(S.key, raw); } catch { return []; }
    }
};

// ═══════════════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════════════
const Auth = {
    async setup() {
        const name = document.getElementById('s-name').value.trim();
        const pw   = document.getElementById('s-pass').value;
        const cf   = document.getElementById('s-conf').value;
        const err  = id => document.getElementById('s-err').textContent = id;
        if (!name)        return err('Please enter your family name.');
        if (pw.length<6)  return err('Password must be at least 6 characters.');
        if (pw !== cf)    return err('Passwords do not match.');

        const salt = btoa(crypto.getRandomValues(new Uint8Array(12)).join(''));
        const hash = await Cry.hash(pw, salt);
        localStorage.setItem('fc_setup','1');
        localStorage.setItem('fc_fam',  name);
        localStorage.setItem('fc_hash', hash);
        localStorage.setItem('fc_salt', salt);
        document.getElementById('s-err').textContent = '';
        Auth.showLogin();
    },

    async login() {
        const pw  = document.getElementById('l-pass').value;
        const err = document.getElementById('l-err');
        const hash = await Cry.hash(pw, localStorage.getItem('fc_salt'));
        if (hash !== localStorage.getItem('fc_hash')) {
            err.textContent = 'Incorrect password. Please try again.';
            return;
        }
        S.key     = await Cry.key(pw, localStorage.getItem('fc_salt'));
        S.famName = localStorage.getItem('fc_fam') || 'Family';
        S.events  = await Store.load();
        document.getElementById('l-pass').value = '';
        err.textContent = '';
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('hdr-title').textContent = S.famName + ' Calendar';
        document.getElementById('app').classList.remove('hidden');
        Cal.render();
    },

    logout() {
        S.key = null; S.events = [];
        document.getElementById('app').classList.add('hidden');
        document.getElementById('l-pass').value = '';
        Auth.showLogin();
    },

    showLogin() {
        const nm = localStorage.getItem('fc_fam') || 'Family';
        document.getElementById('login-title').textContent = nm + ' Calendar';
        document.getElementById('login-screen').classList.remove('hidden');
        document.getElementById('setup-screen').classList.add('hidden');
        setTimeout(() => document.getElementById('l-pass').focus(), 80);
    },

    init() {
        if (localStorage.getItem('fc_setup')) Auth.showLogin();
        else document.getElementById('setup-screen').classList.remove('hidden');
    }
};

// ═══════════════════════════════════════════════════════════
// EVENTS CRUD
// ═══════════════════════════════════════════════════════════
const Ev = {
    add(e)    { e.id=Date.now().toString(36)+Math.random().toString(36).slice(2); S.events.push(e); Store.save(); },
    upd(id,e) { const i=S.events.findIndex(x=>x.id===id); if(i>=0){S.events[i]={...e,id};Store.save();} },
    del(id)   { S.events=S.events.filter(x=>x.id!==id); Store.save(); }
};

// ═══════════════════════════════════════════════════════════
// CALENDAR RENDERING
// ═══════════════════════════════════════════════════════════
const Cal = {
    setView(v, btn) {
        S.view = v;
        document.querySelectorAll('[data-v]').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        Cal.render();
    },

    togMem(m, btn) {
        if (m === 'all') {
            const allOn = ['donal','nicola','aoife'].every(x=>S.members.has(x));
            const target = !allOn;
            ['donal','nicola','aoife','family'].forEach(x=> target ? S.members.add(x) : S.members.delete(x));
            document.querySelectorAll('[data-m]').forEach(b=>{
                if (b.dataset.m!=='all') b.classList.toggle('on',target);
            });
            btn.classList.toggle('on', target);
        } else {
            S.members.has(m) ? S.members.delete(m) : S.members.add(m);
            btn.classList.toggle('on', S.members.has(m));
            const allOn = ['donal','nicola','aoife'].every(x=>S.members.has(x));
            document.querySelector('[data-m="all"]').classList.toggle('on', allOn);
        }
        Cal.render();
    },

    prev() {
        const d=S.cur;
        if(S.view==='month')      d.setMonth(d.getMonth()-1);
        else if(S.view==='week')  d.setDate(d.getDate()-7);
        else if(S.view==='day')   d.setDate(d.getDate()-1);
        else if(S.view==='year')  d.setFullYear(d.getFullYear()-1);
        S.cur=new Date(d); Cal.render();
    },

    next() {
        const d=S.cur;
        if(S.view==='month')      d.setMonth(d.getMonth()+1);
        else if(S.view==='week')  d.setDate(d.getDate()+7);
        else if(S.view==='day')   d.setDate(d.getDate()+1);
        else if(S.view==='year')  d.setFullYear(d.getFullYear()+1);
        S.cur=new Date(d); Cal.render();
    },

    goToday() { S.cur=new Date(); Cal.render(); },

    goDay(ds) {
        S.cur=parseLocalDate(ds); S.view='day';
        document.querySelectorAll('[data-v]').forEach(b=>b.classList.remove('active'));
        document.querySelector('[data-v="day"]').classList.add('active');
        Cal.render();
    },

    goMonth(y,m) {
        S.cur=new Date(y,m,1); S.view='month';
        document.querySelectorAll('[data-v]').forEach(b=>b.classList.remove('active'));
        document.querySelector('[data-v="month"]').classList.add('active');
        Cal.render();
    },

    render() {
        const main=document.getElementById('cal-main');
        const pl=document.getElementById('period-lbl');
        const {cur,view}=S;
        if(view==='month'){
            pl.textContent=MONS[cur.getMonth()]+' '+cur.getFullYear();
            main.innerHTML=Cal.month();
        } else if(view==='week'){
            const ws=weekStart(cur), we=addD(ws,6);
            pl.textContent=fmtShort(ws)+' – '+fmtShort(we);
            main.innerHTML=Cal.week();
            Cal.scrollTo8(document.getElementById('wk-scroll'));
        } else if(view==='day'){
            pl.textContent=DAYS[cur.getDay()]+', '+MONS[cur.getMonth()]+' '+cur.getDate()+', '+cur.getFullYear();
            main.innerHTML=Cal.day();
            Cal.scrollTo8(document.getElementById('day-scroll'));
        } else if(view==='year'){
            pl.textContent=String(cur.getFullYear());
            main.innerHTML=Cal.year();
        }
    },

    scrollTo8(el){ if(el) setTimeout(()=>el.scrollTop=8*60-40,30); },

    // ── MONTH ───────────────────────────────────────────────
    month() {
        const y=S.cur.getFullYear(), m=S.cur.getMonth(), today=todayStr();
        const first=new Date(y,m,1), last=new Date(y,m+1,0);
        const startDow=first.getDay(), daysInPrev=new Date(y,m,0).getDate();
        let cells=[];
        for(let i=0;i<startDow;i++)
            cells.push({d:daysInPrev-startDow+1+i, mo:m-1, y, other:true});
        for(let d=1;d<=last.getDate();d++)
            cells.push({d, mo:m, y, other:false});
        while(cells.length<42)
            cells.push({d:cells.length-startDow-last.getDate()+1, mo:m+1, y, other:true});

        let h=`<div style="display:flex;flex-direction:column;height:100%;">
            <div class="m-dow-row">${DAYS.map(d=>`<div class="m-dow">${d}</div>`).join('')}</div>
            <div class="m-days">`;

        cells.forEach(c=>{
            const date=new Date(c.y,c.mo,c.d);
            const ds=fmtD(date);
            const isToday=ds===today;
            const evs=evsByDate(ds);
            h+=`<div class="m-day${c.other?' other':''}${isToday?' today':''}"
                onclick="Mod.openNew('${ds}')">
                <div class="dnum">${c.d}</div>`;
            const max=3;
            evs.slice(0,max).forEach(ev=>{
                const mc=MC[ev.member]||MC.family;
                h+=`<div class="ev-chip"
                    style="background:${mc.bg};color:${mc.color};border-left-color:${mc.color};"
                    onclick="event.stopPropagation();Mod.openEdit('${ev.id}')"
                    title="${escHtml(ev.title)}">${escHtml(ev.title)}</div>`;
            });
            if(evs.length>max) h+=`<div class="more-ev">+${evs.length-max} more</div>`;
            h+=`</div>`;
        });
        h+=`</div></div>`;
        return h;
    },

    // ── WEEK ────────────────────────────────────────────────
    week() {
        const ws=weekStart(S.cur), today=todayStr();
        const days=Array.from({length:7},(_,i)=>addD(ws,i));

        let h=`<div class="wk-wrap">
            <div class="wk-head"><div></div>${days.map(d=>{
                const ds=fmtD(d), isT=ds===today;
                return `<div class="wk-head-day${isT?' wk-today':''}" onclick="Cal.goDay('${ds}')">
                    <div class="wd">${DAYS[d.getDay()]}</div>
                    <div class="wdn">${d.getDate()}</div>
                </div>`;
            }).join('')}</div>`;

        // All-day row
        const adEvs=days.map(d=>evsByDate(fmtD(d)).filter(e=>e.allDay));
        const hasAd=adEvs.some(x=>x.length>0);
        if(hasAd){
            h+=`<div class="wk-allday-row"><div class="wk-allday-lbl">all day</div>
                ${days.map((d,i)=>{
                    return `<div class="wk-allday-cell">${adEvs[i].map(ev=>{
                        const mc=MC[ev.member]||MC.family;
                        return `<div class="ev-chip" style="background:${mc.bg};color:${mc.color};border-left-color:${mc.color};"
                            onclick="Mod.openEdit('${ev.id}')">${escHtml(ev.title)}</div>`;
                    }).join('')}</div>`;
                }).join('')}</div>`;
        }

        h+=`<div class="wk-scroll" id="wk-scroll"><div class="wk-body">
            <div class="time-col">${HOURS.map(h2=>`<div class="time-lbl">${h2===0?'':h2<12?h2+'am':h2===12?'12pm':(h2-12)+'pm'}</div>`).join('')}</div>
            ${days.map(d=>{
                const ds=fmtD(d);
                const tevs=evsByDate(ds).filter(e=>!e.allDay);
                return `<div class="wk-day-col" onclick="Mod.openNew('${ds}')">
                    ${HOURS.map(()=>`<div class="hr-cell"></div>`).join('')}
                    ${tevs.map(ev=>Cal.timedEv(ev,'week')).join('')}
                </div>`;
            }).join('')}
        </div></div></div>`;
        return h;
    },

    // ── DAY ─────────────────────────────────────────────────
    day() {
        const ds=fmtD(S.cur);
        const allEvs=evsByDate(ds);
        const adEvs=allEvs.filter(e=>e.allDay);
        const tEvs=allEvs.filter(e=>!e.allDay);

        let h=`<div class="day-wrap">`;
        if(adEvs.length){
            h+=`<div class="day-allday has-ev">
                <div class="day-allday-lbl">All Day</div>
                <div style="display:flex;flex-wrap:wrap;gap:5px;">
                    ${adEvs.map(ev=>{
                        const mc=MC[ev.member]||MC.family;
                        return `<div class="ev-chip" style="background:${mc.bg};color:${mc.color};border-left-color:${mc.color};"
                            onclick="Mod.openEdit('${ev.id}')">${escHtml(ev.title)}</div>`;
                    }).join('')}
                </div></div>`;
        }
        h+=`<div class="day-scroll" id="day-scroll"><div class="day-body">
            <div class="time-col">${HOURS.map(h2=>`<div class="time-lbl">${h2===0?'':h2<12?h2+'am':h2===12?'12pm':(h2-12)+'pm'}</div>`).join('')}</div>
            <div class="day-col" onclick="Mod.openNew('${ds}')">
                ${HOURS.map(()=>`<div class="hr-cell"></div>`).join('')}
                ${tEvs.map(ev=>Cal.timedEv(ev,'day')).join('')}
            </div>
        </div></div></div>`;
        return h;
    },

    timedEv(ev, view) {
        const mc=MC[ev.member]||MC.family;
        const [sh,sm]=(ev.startTime||'00:00').split(':').map(Number);
        const [eh,em]=(ev.endTime||'01:00').split(':').map(Number);
        const top=sh*60+sm;
        const h=Math.max((eh*60+em)-(sh*60+sm),30);
        const cls=view==='day'?'day-ev':'timed-ev';
        const timeLabel=view==='day'?`<div class="ev-time">${ev.startTime}–${ev.endTime}</div>`:'';
        return `<div class="${cls}"
            style="top:${top}px;height:${h}px;background:${mc.bg};color:${mc.color};border-left-color:${mc.color};"
            onclick="event.stopPropagation();Mod.openEdit('${ev.id}')">
            <div>${escHtml(ev.title)}</div>${timeLabel}
        </div>`;
    },

    // ── YEAR ────────────────────────────────────────────────
    year() {
        const y=S.cur.getFullYear(), today=todayStr();
        let h=`<div class="yr-grid">`;
        for(let m=0;m<12;m++){
            const first=new Date(y,m,1), last=new Date(y,m+1,0);
            const startDow=first.getDay();
            h+=`<div class="mini-mo" onclick="Cal.goMonth(${y},${m})">
                <div class="mini-mo-title">${MONS[m]}</div>
                <div class="mini-grid">
                    ${DAYS.map(d=>`<div class="mini-dow-h">${d[0]}</div>`).join('')}`;
            // padding
            for(let i=0;i<startDow;i++){
                h+=`<div class="mini-d" style="opacity:.25;">${new Date(y,m,0).getDate()-startDow+1+i}</div>`;
            }
            for(let d=1;d<=last.getDate();d++){
                const ds=`${y}-${pad(m+1)}-${pad(d)}`;
                const isT=ds===today;
                const dayEvs=evsByDate(ds);
                const memColors=[...new Set(dayEvs.map(e=>MC[e.member]?.color||MC.family.color))].slice(0,3);
                const dots=memColors.map(c=>`<div class="dot" style="background:${c};"></div>`).join('');
                h+=`<div class="mini-d${isT?' m-today':''}">
                    <span>${d}</span>
                    ${dots?`<div class="dot-row">${dots}</div>`:''}
                </div>`;
            }
            h+=`</div></div>`;
        }
        h+=`</div>`;
        return h;
    }
};

// ═══════════════════════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════════════════════
const Mod = {
    editId: null,

    openNew(dateStr) {
        const ds=dateStr||fmtD(S.cur);
        Mod.editId=null;
        document.getElementById('mod-title').textContent='Add Event';
        document.getElementById('ev-title').value='';
        document.getElementById('ev-mem').value='donal';
        document.getElementById('ev-sd').value=ds;
        document.getElementById('ev-ed').value=ds;
        document.getElementById('ev-allday').checked=false;
        document.getElementById('ev-st').value='09:00';
        document.getElementById('ev-et').value='10:00';
        document.getElementById('ev-notes').value='';
        document.getElementById('ev-times').style.display='';
        document.getElementById('btn-del').classList.add('hidden');
        document.getElementById('ev-modal').classList.remove('hidden');
        setTimeout(()=>document.getElementById('ev-title').focus(),80);
    },

    openEdit(id) {
        const ev=S.events.find(e=>e.id===id);
        if(!ev) return;
        Mod.editId=id;
        document.getElementById('mod-title').textContent='Edit Event';
        document.getElementById('ev-title').value=ev.title;
        document.getElementById('ev-mem').value=ev.member;
        document.getElementById('ev-sd').value=ev.startDate;
        document.getElementById('ev-ed').value=ev.endDate||ev.startDate;
        document.getElementById('ev-allday').checked=!!ev.allDay;
        document.getElementById('ev-st').value=ev.startTime||'09:00';
        document.getElementById('ev-et').value=ev.endTime||'10:00';
        document.getElementById('ev-notes').value=ev.notes||'';
        document.getElementById('ev-times').style.display=ev.allDay?'none':'';
        document.getElementById('btn-del').classList.remove('hidden');
        document.getElementById('ev-modal').classList.remove('hidden');
    },

    close() {
        document.getElementById('ev-modal').classList.add('hidden');
        Mod.editId=null;
    },

    togAllDay(cb) {
        document.getElementById('ev-times').style.display=cb.checked?'none':'';
    },

    save() {
        const title=document.getElementById('ev-title').value.trim();
        const titleEl=document.getElementById('ev-title');
        if(!title){
            titleEl.style.borderColor='#F87171';
            titleEl.focus();
            setTimeout(()=>titleEl.style.borderColor='',2000);
            return;
        }
        const allDay=document.getElementById('ev-allday').checked;
        const ev={
            title,
            member:   document.getElementById('ev-mem').value,
            startDate:document.getElementById('ev-sd').value,
            endDate:  document.getElementById('ev-ed').value,
            allDay,
            startTime:allDay?null:document.getElementById('ev-st').value,
            endTime:  allDay?null:document.getElementById('ev-et').value,
            notes:    document.getElementById('ev-notes').value.trim()
        };
        if(Mod.editId) Ev.upd(Mod.editId,ev); else Ev.add(ev);
        Mod.close();
        Cal.render();
    },

    del() {
        if(!Mod.editId) return;
        if(confirm('Delete this event?')){ Ev.del(Mod.editId); Mod.close(); Cal.render(); }
    }
};

// Close modal when clicking backdrop
document.getElementById('ev-modal').addEventListener('click',function(e){
    if(e.target===this) Mod.close();
});

function escHtml(s){
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

Auth.init();
